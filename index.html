<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador de Agenda - Edukar360</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- Estilos Externos -->
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

    <!-- Login Overlay -->
    <div id="login-overlay" class="login-overlay">
        <div class="card"
            style="--cat-color: var(--primary); width:90%; max-width:380px; animation: fadeInUp 0.6s ease-out both;">
            <span class="badge" style="--cat-color: var(--primary)">PORTAL ESTUDIANTE</span>
            <div class="card-resumen">Agenda Académica Edukar360</div>
            <form id="login-form" style="margin-top: 18px;">
                <div class="input-group">
                    <label for="student-user">Usuario Edukar360</label>
                    <input type="text" id="student-user" placeholder="DNI o Código" required>
                </div>
                <div class="input-group">
                    <label for="student-pass">Contraseña</label>
                    <input type="password" id="student-pass" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-login">Ingresar a la Agenda</button>
            </form>
            <div class="card-footer" style="margin-top: 18px;">
                <span>🔒 Acceso seguro al portal académico</span>
                <span># Edukar360</span>
            </div>
        </div>
    </div>

    <div class="container">
        <header>
            <h1>Agenda Académica</h1>
            <p class="subtitle">Visualizando datos extraídos de Edukar360</p>
        </header>

        <div class="controls">
            <!-- Mini Calendario -->
            <div class="calendar-widget">
                <div class="cal-header">
                    <button id="cal-prev" class="cal-nav">‹</button>
                    <span id="cal-month-label"></span>
                    <button id="cal-next" class="cal-nav">›</button>
                </div>
                <div class="cal-weekdays">
                    <span>Lu</span><span>Ma</span><span>Mi</span>
                    <span>Ju</span><span>Vi</span><span>Sa</span><span>Do</span>
                </div>
                <div id="cal-grid" class="cal-grid"></div>
                <div class="cal-selected-info">
                    <span id="selected-dates-label">Ningún día seleccionado</span>
                </div>
            </div>
            <button class="btn-refresh" id="btn-scrape" onclick="loadDataForDates()">
                🔄 Actualizar Vista
            </button>
        </div>

        <div id="agenda-grid" class="grid">
            <!-- Las tareas se cargarán vía JS -->
            <div class="empty-state">
                <h2>Cargando datos...</h2>
                <p>Iniciando conexión con el almacén de datos.</p>
            </div>
        </div>
    </div>

    <!-- Scripts Externos -->
    <script src="js/ui.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador de Agenda - Edukar360</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-glow: rgba(99, 102, 241, 0.4);
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --accent: #f43f5e;
            --glass-border: rgba(255, 255, 255, 0.1);
            
            /* Colores por Categoría */
            --cat-tarea: #fbbf24;
            --cat-agenda: #60a5fa;
            --cat-lecciones: #c084fc;
            --cat-examen: #f43f5e;
            --cat-aporte: #34d399;
            --cat-proyecto: #fb7185;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(99, 102, 241, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 100% 100%, rgba(244, 63, 94, 0.1) 0%, transparent 40%);
        }

        .container {
            width: 90%;
            max-width: 1000px;
            padding: 40px 0;
            position: relative;
            z-index: 1;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
            animation: fadeInDown 0.8s ease-out;
        }

        h1 {
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 10px;
            background: linear-gradient(to right, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        .subtitle {
            color: var(--text-dim);
            font-size: 1.1rem;
        }

        .controls {
            margin-bottom: 30px;
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn-refresh {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 15px var(--primary-glow);
        }

        .btn-refresh:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px var(--primary-glow);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            width: 100%;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 25px;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
            animation: fadeInUp 0.6s ease-out both;
        }

        .card:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: var(--cat-color, var(--primary));
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 800;
            letter-spacing: 0.5px;
            margin-bottom: 15px;
            background: rgba(255, 255, 255, 0.05);
            color: var(--cat-color, white);
            border: 1px solid var(--cat-color, rgba(255,255,255,0.1));
        }

        .card-resumen {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 15px;
            line-height: 1.3;
        }

        .card-detalle {
            font-size: 0.9rem;
            color: var(--text-dim);
            line-height: 1.6;
            display: -webkit-box;
            -webkit-line-clamp: 4;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-footer {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
            color: var(--text-dim);
        }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 100px 20px;
            color: var(--text-dim);
        }

        .empty-state h2 {
            margin-bottom: 10px;
            color: white;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsive */
        @media (max-width: 600px) {
            h1 { font-size: 2rem; }
            .container { width: 95%; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Agenda Académica</h1>
            <p class="subtitle">Visualizando datos extraídos de Edukar360</p>
        </header>

        <div class="controls">
            <button class="btn-refresh" onclick="loadData()">Actualizar Vista</button>
        </div>

        <div id="agenda-grid" class="grid">
            <!-- Las tareas se cargarán aquí -->
            <div class="empty-state">
                <h2>Cargando datos...</h2>
                <p>Asegúrate de haber ejecutado <code>node scraper.js</code> primero.</p>
            </div>
        </div>
    </div>

    <script>
        const categoryColors = {
            'TAREA': '#fbbf24',
            'AGENDA': '#60a5fa',
            'DEBERES': '#60a5fa',
            'LECCIONES': '#c084fc',
            'EXAMEN': '#f43f5e',
            'APORTE': '#34d399',
            'TALLER': '#34d399',
            'PROYECTO': '#fb7185'
        };

        async function loadData() {
            const grid = document.getElementById('agenda-grid');
            
            try {
                // Intentamos cargar el JSON generado por el scraper
                const response = await fetch('agenda_resultado.json');
                if (!response.ok) throw new Error('No se encontró el archivo de datos.');
                
                const data = await response.json();
                
                if (data.length === 0) {
                    showEmptyState('No hay actividades pendientes');
                    return;
                }

                grid.innerHTML = '';
                data.forEach((item, index) => {
                    const color = categoryColors[item.categoria] || '#6366f1';
                    const delay = index * 0.1;
                    
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.style.setProperty('--cat-color', color);
                    card.style.animationDelay = `${delay}s`;
                    
                    card.innerHTML = `
                        <span class="badge" style="--cat-color: ${color}">${item.categoria}</span>
                        <div class="card-resumen">${item.resumen}</div>
                        <div class="card-detalle">${item.detalle}</div>
                        <div class="card-footer">
                            <span>📅 ${item.fecha}</span>
                            <span># Edukar360</span>
                        </div>
                    `;
                    grid.appendChild(card);
                });

            } catch (error) {
                console.error(error);
                showEmptyState('Error al cargar datos', 'Asegúrate de que <code>agenda_resultado.json</code> exista en la carpeta.');
            }
        }

        function showEmptyState(title, message = '') {
            const grid = document.getElementById('agenda-grid');
            grid.innerHTML = `
                <div class="empty-state">
                    <h2>${title}</h2>
                    <p>${message}</p>
                </div>
            `;
        }

        // Cargar al iniciar
        loadData();
    </script>
</body>
</html>

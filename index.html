<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador de Agenda - Edukar360</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- Estilos Externos -->
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

    <div class="container">
        <header>
            <h1>Agenda Académica</h1>
            <p class="subtitle">Visualizando datos extraídos de Edukar360</p>
        </header>

        <div class="controls">
            <button class="btn-refresh" onclick="loadData()">Actualizar Vista</button>
        </div>

        <div id="agenda-grid" class="grid">
            <!-- Las tareas se cargarán vía JS -->
            <div class="empty-state">
                <h2>Cargando datos...</h2>
                <p>Iniciando conexión con el almacén de datos.</p>
            </div>
        </div>
    </div>

    <!-- Scripts Externos -->
    <script src="js/ui.js"></script>
</body>

</html>

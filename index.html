<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduTrack - Seguimiento de Tareas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
</head>

<body>
    <nav>
        <a href="index.html" class="logo">EduTrack</a>
        <div id="nav-auth-buttons">
            <!-- Dynamic buttons -->
        </div>
    </nav>

    <main class="animate-fade-in">
        <div class="auth-container glass-card">
            <h2 id="auth-title">Panel de Control</h2>
            <p id="auth-subtitle" style="margin-bottom: 24px; color: var(--text-muted);">Gestiona y sincroniza tus
                tareas escolares</p>

            <div style="display: flex; gap: 10px; margin-bottom: 30px;">
                <a href="student.html" class="btn"
                    style="flex: 1; background: rgba(99, 102, 241, 0.1); border: 1px solid var(--primary); color: var(--text);">🎓
                    Ver Estudiante</a>
                <a href="admin.html" class="btn"
                    style="flex: 1; background: rgba(236, 72, 153, 0.1); border: 1px solid var(--secondary); color: var(--text);">🛠️
                    Ir a Admin</a>
            </div>

            <!-- Botón de Scraper (Abierto para acceso directo) -->
            <div id="scraper-control" style="border-top: 1px solid var(--glass-border); padding-top: 10px;">
                <button onclick="startScraping()" id="run-scraper-btn" class="btn"
                    style="width: 100%; background: linear-gradient(135deg, #10b981, #059669); color: white; margin-top: 10px;">
                    🔄 Sincronizar con Edukar360
                </button>
                <div id="scraper-log" class="scraper-console"></div>
            </div>
        </div>
    </main>

    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>
</body>

</html>
